<script>
        // Simple Interaction logic
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('playerSearch');
            const playerRows = document.querySelectorAll('#playerList > div');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                playerRows.forEach(row => {
                    const playerName = row.querySelector('h3').textContent.toLowerCase();
                    if (playerName.includes(term)) {
                        row.classList.remove('hidden');
                    } else {
                        row.classList.add('hidden');
                    }
                });
            });

            // Toggle payment logic
            const toggles = document.querySelectorAll('input[type="checkbox"]');
            toggles.forEach(toggle => {
                toggle.addEventListener('change', function() {
                    const statusSpan = this.closest('div.flex.items-center.justify-between').querySelector('.flex.items-center.gap-xs span:last-child');
                    const iconSpan = this.closest('div.flex.items-center.justify-between').querySelector('.material-symbols-outlined.text-\\[14px\\]');
                    const amountSpan = this.closest('div.flex.items-center.justify-between').querySelector('.font-currency-md');
                    
                    if (this.checked) {
                        statusSpan.textContent = 'Pagado';
                        statusSpan.className = 'font-label-sm text-label-sm text-on-tertiary-container';
                        iconSpan.textContent = 'check_circle';
                        iconSpan.className = 'material-symbols-outlined text-[14px] text-on-tertiary-container';
                        iconSpan.style.fontVariationSettings = "'FILL' 1";
                        amountSpan.classList.remove('text-error');
                        amountSpan.classList.add('text-primary');
                    } else {
                        statusSpan.textContent = 'Pendiente';
                        statusSpan.className = 'font-label-sm text-label-sm text-outline';
                        iconSpan.textContent = 'schedule';
                        iconSpan.className = 'material-symbols-outlined text-[14px] text-outline';
                        iconSpan.style.fontVariationSettings = "'FILL' 0";
                        amountSpan.classList.remove('text-primary');
                        amountSpan.classList.add('text-error');
                    }
                });
            });
        });
    </script>
