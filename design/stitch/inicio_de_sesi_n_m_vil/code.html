<!DOCTYPE html><html lang="es" class="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><script id="tailwind-config">try{

        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#acf847",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#dbe1ff",

                    "surface-bright": "#f7f9fb",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#45474c",
                    "background": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "on-background": "#191c1e",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#00174b",
                    "on-tertiary-container": "#64a000",
                    "surface-dim": "#d8dadc",
                    "inverse-on-surface": "#eff1f3",
                    "inverse-surface": "#2d3133",
                    "on-primary-container": "#8590a6",
                    "tertiary": "#0b1800",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#111c2d",
                    "on-tertiary-fixed-variant": "#304f00",
                    "on-secondary-fixed-variant": "#003ea8",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "outline-variant": "#c5c6cd",
                    "surface-container-low": "#f2f4f6",
                    "tertiary-fixed-dim": "#91db2a",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#b4c5ff",
                    "surface-container-high": "#e6e8ea",
                    "on-tertiary": "#ffffff",
                    "secondary": "#0051d5",
                    "surface-tint": "#545f73",
                    "outline": "#75777d",
                    "primary": "#091426",
                    "surface-container": "#eceef0"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin": "20px",
                    "gutter": "16px",
                    "lg": "24px",
                    "sm": "12px",
                    "base": "4px",
                    "md": "16px",
                    "xs": "8px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Inter"],
                    "label-sm": ["Inter"],
                    "currency-md": ["Inter"],
                    "label-lg": ["Inter"],
                    "title-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "currency-md": ["18px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    }catch(_e){}</script></head><body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-md">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10 opacity-40">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-tertiary-fixed/10 rounded-full blur-[120px]"></div>
</div>
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo & Branding -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-16 h-16 bg-primary text-on-primary rounded-xl flex items-center justify-center shadow-lg mb-md">
<span class="material-symbols-outlined !text-[40px]" data-icon="sports_volleyball">sports_volleyball</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">VolleyFlow</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs px-md">Organiza tus partidos sin perder el ritmo</p>
</div>
<!-- Login Form Container -->
<div class="w-full bg-surface-container-lowest rounded-[16px] p-xl shadow-xl shadow-slate-200/50 border border-outline-variant/30">
<form id="loginForm" class="space-y-lg">
<!-- Email Field (With Validation Error Example) -->
<div class="flex flex-col gap-xs">
<label for="email" class="font-label-lg text-label-lg text-primary px-1">Correo electrónico</label>
<div class="relative">
<input type="email" id="email" placeholder="ejemplo@correo.com" class="w-full px-md py-sm h-[52px] bg-surface rounded-[16px] border-2 border-error focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50">
<div class="absolute inset-y-0 right-md flex items-center text-error">
<span class="material-symbols-outlined" data-icon="error">error</span>
</div>
</div>
<span class="font-label-sm text-label-sm text-error px-1">Correo inválido</span>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-1">
<label for="password" class="font-label-lg text-label-lg text-primary">Contraseña</label>
<a href="#" class="font-label-sm text-label-sm text-secondary hover:underline">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<input type="password" id="password" placeholder="••••••••" class="w-full px-md py-sm h-[52px] bg-surface rounded-[16px] border border-outline-variant focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50">
<button type="button" class="absolute inset-y-0 right-md flex items-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action Button (With Loading State Example) -->
<div class="pt-sm">
<button type="submit" class="w-full h-[52px] bg-secondary text-on-secondary rounded-[16px] font-title-md text-title-md flex items-center justify-center gap-sm hover:bg-secondary/90 active:scale-[0.98] transition-all shadow-md shadow-secondary/20 group relative overflow-hidden">
<span id="buttonText">Iniciar sesión</span>
<div id="loadingSpinner" class="hidden">
<div class="loading-spinner"></div>
</div>
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-xl text-center border-t border-outline-variant pt-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿No tienes una cuenta? 
                    <a href="#" class="font-label-lg text-label-lg text-secondary ml-xs hover:underline">Registrarse</a>
</p>
</div>
</div>
<!-- Footer / System Credits -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/60">© 2024 VolleyFlow Professional Sports Management</p>
</footer>
</main>
<script>
        // Micro-interaction for loading state demonstration
        const form = document.getElementById('loginForm');
        const btnText = document.getElementById('buttonText');
        const spinner = document.getElementById('loadingSpinner');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Toggle loading state
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            submitBtn.classList.add('opacity-90', 'cursor-not-allowed');
            submitBtn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
                submitBtn.classList.remove('opacity-90', 'cursor-not-allowed');
                submitBtn.disabled = false;
                alert('Demostración de estado de carga finalizada.');
            }, 3000);
        });

        // Toggle password visibility interaction
        const passToggle = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        passToggle.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            passToggle.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
